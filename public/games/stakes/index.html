<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stakes | Crypto Arcade</title>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="stakes.css">
</head>
<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <div class="nav-item active" onclick="switchGame('mines')">
            <i class="bi bi-grid-3x3-gap-fill"></i>
            <span>Mines</span>
        </div>
        <div class="nav-item" onclick="switchGame('dice')">
            <i class="bi bi-dice-5-fill"></i>
            <span>Dice</span>
        </div>
        <div class="nav-item" onclick="switchGame('crash')">
            <i class="bi bi-graph-up-arrow"></i>
            <span>Crash</span>
        </div>
        <div class="nav-item" onclick="switchGame('plinko')">
            <i class="bi bi-triangle"></i>
            <span>Plinko</span>
        </div>
        <div style="flex:1;"></div>
        <div class="nav-item" onclick="window.location.href='../../index.html'">
            <i class="bi bi-box-arrow-left"></i>
            <span>Exit Arcade</span>
        </div>
    </div>

    <!-- Main Content -->
    <div class="content">
        <div class="header">
            <div class="logo" onclick="window.location.href='../../index.html'">
                STAKES<span class="logo-accent">.</span>
            </div>
            <div class="balance-container">
                <div class="balance-icon">$</div>
                <div class="balance-val" id="token-balance">1000.00</div>
            </div>
        </div>

        <div class="game-wrapper">
            <div class="game-viewport">
                <!-- Left Controls -->
                <div class="bet-controls" id="controls-panel">
                    <!-- Injected by JS -->
                </div>

                <!-- Right Screen -->
                <div class="game-screen" id="game-panel">
                    <!-- Injected by JS -->
                </div>
            </div>

            <!-- Ledger -->
            <div class="ledger">
                <div class="ledger-header">Live Ledger</div>
                <table class="ledger-table">
                    <thead>
                        <tr>
                            <th>User</th>
                            <th>Game</th>
                            <th>Bet</th>
                            <th>Multiplier</th>
                            <th>Payout</th>
                        </tr>
                    </thead>
                    <tbody id="ledger-body">
                        <!-- Injected by JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Central Engine -->
    <script src="engine_v2.js"></script>
    <script src="../../assets/js/api.js"></script>
    <script src="../../components/ui.js"></script>
</body>
</html>
