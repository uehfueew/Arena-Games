<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maze Quest</title>
    <link rel="stylesheet" href="../../assets/css/reset.css">
    <link rel="stylesheet" href="../../assets/css/variables.css">
    <link rel="stylesheet" href="../../assets/css/layout.css">
    <link rel="stylesheet" href="../../assets/css/components.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; overflow: hidden; }
        .maze-container {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: calc(100vh - 60px); width: 100%; position: relative; margin-top: 60px;
        }
        #game-header { 
            width: 100%; max-width: 650px; display: flex; justify-content: space-between; 
            margin-bottom: 20px; align-items: center; background: rgba(30, 41, 59, 0.7); 
            backdrop-filter: blur(10px); padding: 15px 25px; border-radius: 16px; 
            box-shadow: 0 4px 30px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.05); 
        }
        #level-indicator { font-size: 1.5rem; font-weight: 800; color: #38bdf8; text-shadow: 0 0 10px rgba(56, 189, 248, 0.5); }
        .controls { display: flex; gap: 15px; }
        .btn-outline { border-color: rgba(255,255,255,0.2); color: #fff; }
        .btn-outline:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.4); }
        
        #game-area { 
            position: relative; background: #070a14; padding: 0; border-radius: 16px; 
            box-shadow: 0 0 50px rgba(0,0,0,0.8), 0 0 0 2px rgba(255,255,255,0.05); overflow: hidden; 
        }
        #maze-canvas { display: block; border-radius: 16px; }
        
        #roadmap-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(2, 6, 23, 0.85); 
            backdrop-filter: blur(10px); z-index: 1000; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; opacity: 1; transition: opacity 0.3s;
        }
        #roadmap-overlay.hidden { opacity: 0; pointer-events: none; }
        
        .roadmap-container {
            background: #0f172a; width: 90%; max-width: 900px; height: 85vh; border-radius: 24px;
            padding: 30px; display: flex; flex-direction: column; box-shadow: 0 20px 50px rgba(0,0,0,0.6); 
            border: 1px solid rgba(255,255,255,0.1);
        }
        .roadmap-header { 
            display: flex; justify-content: space-between; margin-bottom: 25px; align-items: center; 
            border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px; 
        }
        .roadmap-header h2 { font-size: 2rem; font-weight: 800; color: #38bdf8; margin: 0; text-shadow: 0 0 15px rgba(56,189,248,0.4); }
        
        .roadmap-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 15px; 
            overflow-y: auto; padding-right: 15px; padding-bottom: 20px; flex: 1;
        }
        .roadmap-grid::-webkit-scrollbar { width: 8px; }
        .roadmap-grid::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        
        .level-btn {
            background: #1e293b; border: 2px solid transparent; color: #94a3b8;
            border-radius: 12px; height: 100px; display: flex; flex-direction: column; align-items: center; 
            justify-content: center; font-weight: 700; cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .level-btn:hover { transform: translateY(-5px) scale(1.05); background: #334155; color: #f8fafc; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .level-btn.locked { background: #0f172a; color: #334155; border-color: rgba(255,255,255,0.02); cursor: not-allowed; pointer-events: none; }
        .level-btn.completed { border-color: #10b981; color: #10b981; background: rgba(16, 185, 129, 0.1); }
        .level-btn.completed:hover { background: rgba(16, 185, 129, 0.2); box-shadow: 0 10px 20px rgba(16, 185, 129, 0.2); }
        .level-btn.current { border-color: #38bdf8; background: #38bdf8; color: #0f172a; box-shadow: 0 0 20px rgba(56, 189, 248, 0.4); text-shadow: none; }
        .level-btn.current:hover { background: #7dd3fc; border-color: #7dd3fc; }
        
        .win-screen { 
            position: absolute; inset: 0; background: rgba(2, 6, 23, 0.9); backdrop-filter: blur(8px); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            border-radius: 16px; border: 2px solid #10b981; z-index: 10; opacity: 0; transition: opacity 0.5s; pointer-events: none; 
        }
        .win-screen.visible { opacity: 1; pointer-events: all; }
        .mech-icon { font-size: 0.9rem; margin-top: 8px; display: flex; gap: 6px; }
        
        .instruction-toast { 
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); 
            background: rgba(30,41,59,0.9); backdrop-filter: blur(5px); padding: 12px 25px; 
            border-radius: 30px; font-size: 1rem; border: 1px solid rgba(255,255,255,0.1); 
            pointer-events: none; opacity: 0; transition: opacity 0.5s; font-weight: 600; color: #38bdf8;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <nav class="navbar" style="position: fixed; top: 0; left: 0; right: 0; height: 70px; z-index: 10; background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(56, 189, 248, 0.2); display: flex; justify-content: space-between; align-items: center; padding: 0 40px; box-shadow: 0 4px 30px rgba(0,0,0,0.5);">
        <div class="nav-brand" style="display: flex; align-items: center; gap: 20px;">
            <a href="../../index.html" class="back-btn" style="text-decoration: none; color: #94a3b8; font-weight: 600; display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.05); padding: 8px 16px; border-radius: 8px; transition: all 0.3s; border: 1px solid rgba(255,255,255,0.1);">
                <i class="bi bi-arrow-left" style="font-size: 1.2rem;"></i> <span style="letter-spacing: 1px;">HUB</span>
            </a>
            <div style="height: 30px; width: 1px; background: rgba(255,255,255,0.1);"></div>
            <span class="game-title" style="color: #38bdf8; font-size: 1.8rem; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 15px rgba(56, 189, 248, 0.6); display: flex; align-items: center; gap: 10px;">
                <i class="bi bi-box"></i> Maze Quest
            </span>
        </div>
        <div class="nav-user">
            <div id="nav-username" style="display: flex; align-items: center; gap: 10px; font-weight: 700; color: #f8fafc; background: linear-gradient(135deg, rgba(56,189,248,0.1), rgba(16,185,129,0.1)); padding: 8px 20px; border-radius: 30px; border: 1px solid rgba(56,189,248,0.3); box-shadow: 0 0 15px rgba(56,189,248,0.15);">
                <i class="bi bi-person-circle" style="font-size: 1.3rem; color: #38bdf8;"></i> <span style="letter-spacing: 0.5px;">Guest</span>
            </div>
        </div>
    </nav>

    <div class="maze-container">
        <div id="game-header">
            <div id="level-indicator">Level 1</div>
            <div class="controls">
                <button class="btn btn-outline" onclick="showRoadmap()"><i class="bi bi-map-fill"></i> Roadmap</button>
            </div>
        </div>
        
        <div id="game-area">
            <canvas id="maze-canvas" width="600" height="600"></canvas>
            <div id="instruction-toast" class="instruction-toast">Use Arrow Keys or WASD to move</div>
            <div id="win-screen" class="win-screen">
                <h2 style="color: #10b981; font-size: 3rem; margin-bottom: 20px; text-shadow: 0 0 20px rgba(16, 185, 129, 0.5);"><i class="bi bi-stars"></i> Cleared!</h2>
                <div style="display: flex; gap: 15px;">
                    <button class="btn btn-outline" style="padding: 12px 25px; font-size: 1.1rem;" onclick="showRoadmap()"><i class="bi bi-map"></i> Roadmap</button>
                    <button class="btn btn-primary" style="padding: 12px 25px; font-size: 1.1rem; background: #38bdf8; color: #0f172a; font-weight: 800; border: none;" onclick="nextLevel()">Next Level <i class="bi bi-arrow-right-circle-fill"></i></button>
                </div>
            </div>
        </div>
    </div>

    <!-- Displayed by default on load -->
    <div id="roadmap-overlay">
        <div class="roadmap-container">
            <div class="roadmap-header">
                <h2><i class="bi bi-geo-alt-fill"></i> Select Your Stage</h2>
                <button class="btn btn-outline" onclick="hideRoadmap()"><i class="bi bi-play-fill"></i> Resume</button>
            </div>
            <div class="roadmap-grid" id="roadmap-grid"></div>
        </div>
    </div>

    <script src="game.js"></script>
    <script src="../../assets/js/api.js"></script>
    <script src="../../components/ui.js"></script>
</body>
</html>
