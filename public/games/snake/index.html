<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake | Grass & Apples</title>
    <link rel="stylesheet" href="../../assets/css/reset.css">
    <link rel="stylesheet" href="../../assets/css/variables.css">
    <link rel="stylesheet" href="../../assets/css/typography.css">
    <link rel="stylesheet" href="../../assets/css/components.css">
    <link rel="stylesheet" href="../../assets/css/layout.css">
    <link rel="stylesheet" href="../../assets/css/main.css">
    <style>
        body { 
            margin: 0; 
            background-color: #1a1a1a; 
            color: white; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            overflow: hidden; 
            font-family: monospace; 
        }
        .game-header { 
            width: 100%; 
            max-width: 600px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 15px 0; 
            font-size: 24px; 
            font-weight: bold;
        }
        .btn-back { 
            padding: 8px 16px; 
            background: #2a2a2a; 
            color: white; 
            text-decoration: none; 
            border-radius: 4px; 
            font-size: 16px; 
            transition: 0.2s; 
            border: 1px solid #444;
        }
        .btn-back:hover { 
            background: #444; 
        }
        #game-container { 
            position: relative; 
            width: 600px; 
            height: 600px; 
            box-shadow: 0 0 20px rgba(0,0,0,0.5); 
            border: 8px solid #2d1c0a; /* dirt border */
            border-radius: 8px; 
            overflow: hidden; 
            background-color: #558732; /* grass background */
        }
        canvas { 
            display: block; 
            width: 100%; 
            height: 100%; 
        }
        #overlay { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            background: rgba(0, 0, 0, 0.7); 
            z-index: 10; 
        }
        #overlay.hidden {
            display: none;
        }
        #overlay h1 { 
            font-size: 56px; 
            margin-bottom: 20px; 
            color: #8bc34a; 
            text-shadow: 2px 2px 0px rgba(0,0,0,0.8); 
            font-family: 'Arial', sans-serif;
            letter-spacing: 2px;
        }
        #overlay h1 span { color: #f44336; } /* Apple red */
        
        .blink { 
            animation: blinker 1s linear infinite; 
            font-size: 24px; 
            color: #fff; 
        }
        @keyframes blinker { 50% { opacity: 0; } }
        
        #combo-bar-container { 
            width: 100%; 
            max-width: 600px; 
            height: 12px; 
            background: #2a2a2a; 
            margin-top: 15px; 
            border-radius: 6px; 
            overflow: hidden; 
            border: 1px solid #444;
        }
        #combo-bar { 
            width: 0%; 
            height: 100%; 
            background: linear-gradient(90deg, #ff9800, #ffeb3b); 
            transition: width 0.1s linear, background-color 0.3s; 
        }
        .stats-wrap {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .multiplier { 
            color: #ffeb3b; 
            font-weight: bold; 
            transition: transform 0.1s;
            display: inline-block;
        }
        .multiplier.active {
            transform: scale(1.3);
            color: #ff9800;
        }
    </style>
</head>
<body>
    <div class="game-header">
        <a href="../../index.html" class="btn-back">← Main Menu</a>
        <div class="stats-wrap">
            <div>Score: <span id="scoreVal">0</span></div>
            <div>| High Score: <span id="highScoreVal">0</span></div>
            <div id="multiplierVal" class="multiplier"></div>
        </div>
    </div>
    
    <div id="game-container">
        <canvas id="gameCanvas" width="600" height="600"></canvas>
        <div id="overlay">
            <h1 id="overlay-title">SNAKE <span>&</span> APPLES</h1>
            <div id="overlay-msg" class="blink">PRESS SPACE TO START</div>
        </div>
    </div>

    <div id="combo-bar-container">
        <div id="combo-bar"></div>
    </div>

    <!-- Use type="module" to align with ES conventions or just standard script -->
    <script src="game.js"></script>
    <script src="../../assets/js/api.js"></script>
    <script src="../../components/ui.js"></script>
</body>
</html>
