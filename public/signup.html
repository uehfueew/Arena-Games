<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Arcade Hub | Auth</title>
<link href="/assets/css/main.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet"/><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/></head>
<body style="display:flex; align-items:center; justify-content:center; background:#0f1013;">
<div style="background:var(--bg-card); padding:40px; border-radius:var(--border-radius-lg); box-shadow:var(--shadow-md); width:100%; max-width:400px; text-align:center; border: 1px solid rgba(255,255,255,0.05);">
<h1 style="font-size:2rem; font-weight:800; margin-bottom:10px;"><span style="color:var(--accent-primary);">Arcade</span>Hub</h1>
<p style="color:var(--text-muted); margin-bottom:30px;">AUTHENTICATE</p>
<form id="signupForm" style="display:flex; flex-direction:column; gap:15px; text-align:left;">
<input id="signupUsername" placeholder="Username" required="" style="width:100%; background:var(--bg-input); padding:15px; border-radius:var(--border-radius-md); color:#fff; font-size:1rem;" type="text"/>
<input id="signupPassword" placeholder="Password" required="" style="width:100%; background:var(--bg-input); padding:15px; border-radius:var(--border-radius-md); color:#fff; font-size:1rem;" type="password"/>
<button class="btn btn-primary" style="padding:15px; margin-top:10px; font-size:1rem; text-transform:uppercase; letter-spacing:1px;" type="submit">Create Account</button>
</form>
<p style="margin-top:25px; color:var(--text-muted);">Already connected? <a href="login.html" style="color:var(--accent-primary); font-weight:bold;">Log in</a></p>
</div>
<script src="config.js"></script>
<script src="main.js" type="module"></script>
</body>
</html>
