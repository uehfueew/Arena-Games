<script>
const items = [
    { title: 'Neon Snake', type: 'snake_color', value: '#39ff14', cost: 100, img: 'linear-gradient(135deg, #11998e 0%, #38ef7d 100%)' },
    { title: 'Cyberpunk Snake', type: 'snake_color', value: '#ff00ff', cost: 500, img: 'linear-gradient(135deg, #f12711 0%, #f5af19 100%)' },
    { title: 'Golden Avatar', type: 'avatar', value: '★', cost: 1000, img: 'linear-gradient(135deg, #FFD700 0%, #FDB931 100%)' },
    { title: 'Premium Ticket', type: 'ticket', value: '1', cost: 2000, img: 'linear-gradient(135deg, #8E2DE2 0%, #4A00E0 100%)' },
    { title: 'Red Snake', type: 'snake_color', value: '#ff0000', cost: 150, img: 'linear-gradient(135deg, #ff416c 0%, #ff4b2b 100%)' },
    { title: 'Sapphire Avatar', type: 'avatar', value: '💎', cost: 1500, img: 'linear-gradient(135deg, #2193b0 0%, #6dd5ed 100%)' }
];


document.addEventListener('DOMContentLoaded', () => {
    const grid = document.getElementById('shop-grid');
    if(!grid) return;
    
    grid.innerHTML = items.map((item, i) => {
        let clickAction = item.type === 'snake_color' ? `onclick="previewSnakeColor('${item.value}', '${item.title}')"` : '';
        let badge = item.type === 'snake_color' ? '<span class="tag" style="background:#e74c3c;">Preview</span>' : '';
        
        return `
        <div class="game-card" style="display:flex; flex-direction:column; overflow:hidden; cursor:pointer;" ${clickAction}>
            ${badge}
            <div class="game-card-img" style="background: ${item.img}; height:160px; transition: transform 0.4s; z-index:1;"></div>
            <div style="padding:20px; text-align:center; background:var(--bg-card); flex:1; display:flex; flex-direction:column; justify-content:space-between; z-index:2; border-top:1px solid rgba(255,255,255,0.05);">
                <h3 style="margin-bottom:10px; font-size:1.25rem; font-weight:700;">${item.title}</h3>
                <div style="color:var(--accent-warning); margin-bottom:20px; font-weight:bold; font-size:1.1rem;">💰 ${item.cost} Coins</div>
                <button class="btn btn-outline" style="width:100%; font-weight:bold;" onclick="event.stopPropagation(); buyItem(${i})">Buy Now</button>
            </div>
        </div>
        `;
    }).join('');
});


window.buyItem = function(index) {
    const item = items[index];
    const username = localStorage.getItem('username');
    if(!username) return alert('Please log in to purchase');
    
    fetch('/api/shop/buy', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, type: item.type, item: item.value, cost: item.cost })
    })
    .then(r => r.json())
    .then(d => {
        if(d.error) alert('Error: ' + d.error);
        else alert('Purchase successful!');
    });
};
</script>
