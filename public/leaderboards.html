<link href="styles.css" rel="stylesheet"/> <!-- legacy css fallback for components if any -->
<script src="/main.js" type="module"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
    fetch('/api/leaderboard')
        .then(r => r.json())
        .then(data => {
            const tbody = document.getElementById('leaderboard-body');
            tbody.innerHTML = '';
            data.forEach((user, index) => {
                const tr = document.createElement('tr');
                tr.style.borderBottom = '1px solid rgba(255,255,255,0.05)';
                let rankColor = 'var(--text-muted)';
                if(index === 0) rankColor = 'gold';
                if(index === 1) rankColor = 'silver';
                if(index === 2) rankColor = '#cd7f32'; // bronze
                
                tr.innerHTML = `
                    <td style="padding: 15px; font-weight:bold; color:${rankColor};">#${index+1}</td>
                    <td style="padding: 15px; display:flex; align-items:center; gap:10px;">
                        <div style="width:30px; height:30px; background:var(--accent-primary); border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:bold;">${user.avatar || 'A'}</div>
                        <div>
                            <div style="font-weight:bold;">${user.username}</div>
                            <div style="font-size:0.8rem; color:var(--text-muted);">Level ${user.level}</div>
                        </div>
                    </td>
                    <td style="padding: 15px; font-family:monospace; font-size:1.1rem;">
                        ${user.max_score || 0} pts
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }).catch(err => {
            const t = document.getElementById('leaderboard-body');
            if(t) t.innerHTML = '<tr><td colspan="3" style="padding:15px; text-align:center;">Failed to load data</td></tr>';
        });
});
</script>
