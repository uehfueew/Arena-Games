<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Arcade Hub | Profile</title>
<link href="/assets/css/main.css" rel="stylesheet"/>

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet"/><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/></head>
<body>
<div class="app-container">
<!-- SIDEBAR -->
<aside class="sidebar" id="mainSidebar">
<div class="sidebar-header">
<span>Arcade</span>Hub
            </div>
<ul class="sidebar-nav">
<div class="sidebar-nav-title">Menu</div>
<li>

                        Home
                    </a>
</li>
<li>
<a href="/leaderboards.html">
<svg viewbox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-2 14H7v-2h10v2zm0-4H7v-2h10v2zm0-4H7V7h10v2z"></path></svg>
                        Leaderboards
                    </a>
</li>
<li>
<a href="/shop.html">
<svg viewbox="0 0 24 24"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"></path></svg>
                        Store
                    </a>
</li>
</ul>
<div class="sidebar-footer">
                © 2026 ArcadeHub.
            </div>
</aside>
<!-- MAIN WRAPPER -->
<div class="main-wrapper">
<!-- TOPBAR -->
<header class="topbar">
<div class="topbar-search">
<svg viewbox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"></path></svg>
<input placeholder="Search..." type="text"/>
</div>
<div class="topbar-actions">
<div id="auth-links" style="display: flex; gap: 10px;">
<a class="btn btn-outline" href="/login.html" style="padding: 8px 16px;">Log in</a>
<a class="btn btn-primary" href="/signup.html" style="padding: 8px 16px;">Sign up</a>
</div>
<div id="user-links" style="display: none; align-items: center; gap: 15px;">
<div class="user-badge" onclick="window.location.href='/profile.html'">
<div class="user-avatar" id="nav-avatar">A</div>
<span class="user-name" id="profile-name">Guest</span>
</div>
<button class="btn btn-outline" id="logoutBtn" style="border: none; padding: 8px 12px; color: var(--text-muted);">
<svg style="width: 18px; height: 18px; fill: currentColor; margin-left: 2px;" viewbox="0 0 24 24"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"></path></svg>
</button>
</div>
</div>
</header>
<main class="page-content">
<div class="profile-header-banner" style="height: 200px; border-radius:16px; background: linear-gradient(135deg, rgba(108,92,231,0.8), rgba(0,210,211,0.8)), url('https://images.unsplash.com/photo-1550745165-9bc0b252726f?auto=format&amp;fit=crop&amp;q=80&amp;w=1600') center/cover; position: relative; margin-bottom: 60px; box-shadow:0 8px 20px rgba(0,0,0,0.4);">
<div id="prof-avatar-main" style="width: 120px; height: 120px; font-size:4rem; border-radius: 50%; background: var(--bg-card); display:flex; align-items:center; justify-content:center; position:absolute; bottom: -60px; left: 40px; border: 4px solid var(--bg-main); box-shadow: 0 4px 10px rgba(0,0,0,0.5); font-weight:bold; color: white;">?</div>
<div style="position: absolute; bottom: -50px; left: 180px;">
<h2 id="prof-name-main" style="margin: 0; font-size: 2.2rem; color: #fff; text-shadow: 0 2px 4px rgba(0,0,0,0.5);">Player</h2>
<div style="display:flex; gap:10px; margin-top:5px;">
<div class="tag" style="background:var(--accent-primary); border-radius:4px; padding:2px 8px; font-size:0.8rem; font-weight:bold;">Lvl <span id="prof-lvl">1</span></div>
<div class="tag" style="background:var(--accent-warning); border-radius:4px; padding:2px 8px; font-size:0.8rem; font-weight:bold; color:#000;">🎟️ <span id="prof-tickets-main">0</span> Tickets</div>
</div>
</div>
</div>
<div style="display: grid; grid-template-columns: 1fr 2fr; gap: 30px;">
<!-- LEFT COLUMN -->
<div style="display: flex; flex-direction: column; gap: 20px;">
<div style="background: var(--bg-card); padding: 25px; border-radius: var(--border-radius-md); box-shadow: var(--shadow-md);">
<h3 style="margin-bottom: 20px; font-size: 1.2rem; color: var(--text-light); border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom:10px;">Progression</h3>
<div style="margin-bottom: 15px;">
<div style="display:flex; justify-content:space-between; margin-bottom:5px;">
<span style="font-size:0.9rem; color:var(--text-muted);">Experience</span>
<span id="prof-xp-text" style="font-size:0.9rem; font-weight:bold; color:var(--accent-primary);">0 / 1000 XP</span>
</div>
<div style="width: 100%; background: var(--bg-dark); height: 10px; border-radius: 5px; overflow:hidden;">
<div id="prof-xp-bar" style="height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary)); transition: width 1s ease-in-out;"></div>
</div>
</div>
<h3 style="margin-top: 30px; margin-bottom: 15px; font-size: 1.2rem; color: var(--text-light); border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom:10px;">Equipped Cosmetics</h3>
<div style="display: flex; align-items:center; gap: 15px;">
<div style="width:40px; height:40px; border-radius:50%; background:var(--bg-dark); display:flex; align-items:center; justify-content:center;">
<svg style="fill:white; width:20px; height:20px;" viewbox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"></path></svg>
</div>
<div>
<div style="font-size:0.9rem; color:var(--text-muted);">Snake Color</div>
<div style="display:flex; align-items:center; gap:5px;">
<div id="prof-snake-color-box" style="width:16px; height:16px; border-radius:4px; border:1px solid white;"></div>
<span id="prof-snake-color-hex" style="font-weight:bold;">#FFFFFF</span>
</div>
</div>
</div>
</div>
</div>
<!-- RIGHT COLUMN -->
<div style="display: flex; flex-direction: column; gap: 20px;">
<div style="background: var(--bg-card); padding: 25px; border-radius: var(--border-radius-md); box-shadow: var(--shadow-md);">
<h3 style="margin-bottom: 20px; font-size: 1.2rem; color: var(--text-light); border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom:10px;">Game Statistics</h3>
<div id="prof-stats-grid" style="display:grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px;">
<!-- Stats loaded by logic -->
<div style="color:var(--text-muted);">Loading stats...</div>
</div>
</div>
<div style="background: var(--bg-card); padding: 25px; border-radius: var(--border-radius-md); box-shadow: var(--shadow-md);">
<h3 style="margin-bottom: 20px; font-size: 1.2rem; color: var(--text-light); border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom:10px;">Favorite Games</h3>
<div id="prof-favorites" style="display:flex; flex-wrap:wrap; gap: 10px;">
<!-- Favorites loaded by logic -->
<div style="color:var(--text-muted);">Loading favorites...</div>
</div>
</div>
</div>
</div>
<script>
document.addEventListener('DOMContentLoaded', () => {
    const username = localStorage.getItem('username');
    if (!username) {
        window.location.href = '/login.html';
        return;
    }
    
    // Fetch Profile
    fetch(`/api/profile/${username}`)
        .then(res => res.json())
        .then(data => {
            if(data.error) {
                console.error(data.error);
                return;
            }
            const u = data.user;
            document.getElementById('prof-name-main').textContent = u.username;
            document.getElementById('prof-avatar-main').textContent = u.avatar || u.username.charAt(0).toUpperCase();
            document.getElementById('prof-lvl').textContent = u.level || 1;
            document.getElementById('prof-tickets-main').textContent = u.tickets || 0;
            
            // progression logic
            const xp = u.xp || 0;
            const nextLvlXp = (u.level || 1) * 1000;
            document.getElementById('prof-xp-text').textContent = `${xp} / ${nextLvlXp} XP`;
            document.getElementById('prof-xp-bar').style.width = Math.min(100, (xp/nextLvlXp)*100) + '%';
            
            // cosmetics
            const color = u.snake_color || '#39ff14';
            document.getElementById('prof-snake-color-box').style.backgroundColor = color;
            document.getElementById('prof-snake-color-hex').textContent = color;
            
            // Stats
            const statsContainer = document.getElementById('prof-stats-grid');
            if(data.stats && data.stats.length > 0) {
                statsContainer.innerHTML = data.stats.map(s => {
                    const totalMatches = s.wins + s.losses + s.draws;
                    const winrate = totalMatches > 0 ? Math.round((s.wins / totalMatches) * 100) : 0;
                    return `
                    <div style="background:var(--bg-input); padding:15px; border-radius:8px; border-left: 4px solid var(--accent-primary);">
                        <h4 style="margin:0 0 10px 0; color:var(--text-light); text-transform:capitalize;">${s.game}</h4>
                        <div style="display:flex; justify-content:space-between; font-size:0.9rem; margin-bottom:5px;">
                            <span style="color:var(--text-muted);">Matches</span>
                            <span style="font-weight:bold;">${totalMatches}</span>
                        </div>
                        <div style="display:flex; justify-content:space-between; font-size:0.9rem; margin-bottom:5px;">
                            <span style="color:var(--text-muted);">Winrate</span>
                            <span style="font-weight:bold; color:${winrate > 50 ? 'var(--success, #2ecc71)' : 'var(--danger, #e74c3c)'}">${winrate}%</span>
                        </div>
                        <div style="display:flex; justify-content:space-between; font-size:0.9rem; margin-bottom:10px;">
                            <span style="color:var(--text-muted);">W / L / D</span>
                            <span style="font-weight:bold;">${s.wins} / ${s.losses} / ${s.draws}</span>
                        </div>
                        <div style="font-size:0.85rem; background:rgba(0,0,0,0.2); padding:5px; border-radius:4px; text-align:center;">
                            High Score: <span style="color:var(--accent-warning); font-weight:bold;">${s.high_score}</span>
                        </div>
                    </div>`;
                }).join('');
            } else {
                statsContainer.innerHTML = '<div style="color:var(--text-muted); font-style:italic;">No games played yet.</div>';
            }
        });

    // Fetch Favorites
    fetch(`/api/favorites/${username}`)
        .then(res => res.json())
        .then(data => {
            const favContainer = document.getElementById('prof-favorites');
            if(data && data.length > 0) {
                favContainer.innerHTML = data.map(f => `
                    <a href="/games/${f.game}/index.html" class="btn btn-outline" style="padding: 8px 15px; border-color:var(--accent-secondary); color:var(--text-light); text-decoration:none;">
                        ★ ${f.game_title || f.game}
                    </a>
                `).join('');
            } else {
                favContainer.innerHTML = '<div style="color:var(--text-muted); font-style:italic;">No favorite games added.</div>';
            }
        });
});
</script>
</main>
</div>
</div>
<script src="/config.js"></script>
<script src="/socket.io/socket.io.js"></script>

</body>
